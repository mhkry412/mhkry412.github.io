title: Hanandaru Mahaputra Purwanto
short_title: Handar
tagline: "Computational physicist | BRIN researcher | DFT &amp; MD simulations"
short_intro: >
  I'm a computational physicist at BRIN and M.Sc. candidate at UI,
  simulating 2D materials with DFT and molecular dynamics.
description: >-
  Computational physicist researching 2D materials through DFT and
  molecular dynamics simulations. Research Assistant at BRIN and
  M.Sc. candidate at Universitas Indonesia.
url: "https://mhkry412.github.io"
baseurl: ""
lang: en

markdown: kramdown
highlighter: rouge
permalink: /:year/:title/
mathjax: true

collections:
  projects:
    output: true
    permalink: /projects/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

theme:
  accent: "#000000"
  font_body: "system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
  font_mono: "'SF Mono', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace"
  max_width: "720px"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - assets/resume/resume.typ

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
